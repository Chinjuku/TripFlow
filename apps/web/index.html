<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="/manifest.json" />
  <title>TripFlow</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  
  <script type="module">
    //! first bun i react-grab
    // then in head:
    if (import.meta.env.DEV) {
      import("react-grab");
    }
  </script>
  
  <script>
    // Anti-flash: apply theme before React mounts AND before the CSS bundle
    // loads. Setting only the `.dark` class isn't enough — `--background`
    // lives in the (async) stylesheet, so the page paints default white for a
    // frame on a dark-mode refresh. We also paint the html element's
    // background inline here (matching the dark `--background` token) so there
    // is never a white flash before the CSS arrives. The inline bg is cleared
    // once React/CSS take over (see main.tsx).
    // Must match ThemeProvider's storage key (default light when missing).
    (function () {
      try {
        // System preference sync
        var stored = localStorage.getItem('trip-flow-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || (stored === 'system' && prefersDark) || (!stored && prefersDark);
        
        var root = document.documentElement;
        if (dark) {
          root.classList.add('dark');
          // hsl(222 47% 11%) — the dark `--background` token.
          root.style.backgroundColor = 'hsl(222, 47%, 11%)';
        } else {
          // hsl(210 40% 98%) - the light `--background` token.
          root.style.backgroundColor = 'hsl(210, 40%, 98%)';
        }
        root.style.colorScheme = dark ? 'dark' : 'light';

        var manifestEl = document.querySelector('link[rel="manifest"]');
        if (manifestEl) {
          manifestEl.setAttribute('href', dark ? '/manifest.json' : '/manifest-light.json');
        }

        var themeColorEls = document.querySelectorAll('meta[name="theme-color"]');
        themeColorEls.forEach(function (el) {
          el.setAttribute('content', dark ? '#0f172a' : '#ffffff');
        });
      } catch (_) {
        /* storage disabled - fall through with light theme */
      }
    })();
  </script>
</head>

<body class="bg-background text-foreground antialiased">
  <div id="root">
    <style>
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color, #f8fafc);
      }
      .dark .initial-loader {
        --bg-color: #0f172a;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(156, 163, 175, 0.2);
        border-top-color: #059669; /* emerald-600 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div class="initial-loader">
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
